<!DOCTYPE html>
<html>
<head>
  <title>Global Shipping System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="navbar">
    🚚 Global Shipping System
  </div>

  <div class="container">

    <!-- TRACK SECTION -->
    <div class="card">
      <h2>Track Your Shipment</h2>
      <input id="tracking" placeholder="Enter Tracking Number">
      <button onclick="track()">Track</button>

      <p id="result"></p>
    </div>

    <hr>

    <!-- LOGIN SECTION -->
    <div class="card">
      <h2>Admin Login</h2>

      <input id="username" placeholder="Username">
      <input id="password" type="password" placeholder="Password">

      <button onclick="login()">Login</button>
    </div>

  </div>

  <script>
    const API = "https://shipping-website-lpks.onrender.com";

    // ================= TRACK =================
    async function track() {
      const tracking = document.getElementById("tracking").value;

      if (!tracking) {
        alert("Enter tracking number");
        return;
      }

      try {
        const res = await fetch(API + "/track/" + tracking);
        const data = await res.json();

        if (!data) {
          document.getElementById("result").innerText = "Not found";
          return;
        }

        document.getElementById("result").innerText =
          "Customer: " + data.customer +
          " | Item: " + data.item +
          " | Address: " + data.address +
          " | Price: $" + data.price;

      } catch (err) {
        console.error(err);
        alert("Error tracking shipment");
      }
    }

    // ================= LOGIN =================
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (!username || !password) {
        alert("Enter username and password");
        return;
      }

      try {
        const res = await fetch(API + "/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);

          // ✅ redirect to dashboard
          window.location.href = "/dashboard";
        } else {
          alert("Login failed");
        }

      } catch (err) {
        console.error(err);
        const text = await res.text();
alert(text);
      }
    }

  </script>

</body>
</html>
